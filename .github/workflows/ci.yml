name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit, build, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      RATE_LIMIT_TEST: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        if: ${{ secrets.DATABASE_URL != '' }}
        run: npm install -g vercel@48

      - name: Link Vercel project (for API routes in E2E)
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.DATABASE_URL != '' }}
        run: npx vercel pull --yes --environment=development --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
